<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>OG Image</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1200px;
    height: 630px;
    overflow: hidden;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
  }

  .container {
    width: 1200px;
    height: 630px;
    background: linear-gradient(135deg, #000810 0%, #001a33 30%, #00264d 50%, #001a33 70%, #000810 100%);
    position: relative;
    display: flex;
    align-items: center;
    padding: 60px 80px;
    overflow: hidden;
  }

  /* Glowing orb */
  .glow-orb {
    position: absolute;
    border-radius: 50%;
    filter: blur(80px);
    opacity: 0.4;
  }
  .glow-orb.orb1 {
    width: 400px;
    height: 400px;
    background: radial-gradient(circle, rgba(30, 90, 200, 0.6), transparent);
    top: -100px;
    right: -50px;
  }
  .glow-orb.orb2 {
    width: 300px;
    height: 300px;
    background: radial-gradient(circle, rgba(0, 150, 255, 0.4), transparent);
    bottom: -80px;
    left: 100px;
  }
  .glow-orb.orb3 {
    width: 200px;
    height: 200px;
    background: radial-gradient(circle, rgba(100, 180, 255, 0.3), transparent);
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
  }

  /* Grid lines */
  .grid-overlay {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background-image:
      linear-gradient(rgba(30, 120, 255, 0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(30, 120, 255, 0.04) 1px, transparent 1px);
    background-size: 60px 60px;
  }

  /* Floating dots (stars) */
  .dots {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background-image:
      radial-gradient(2px 2px at 100px 80px, rgba(255,255,255,0.3), transparent),
      radial-gradient(2px 2px at 300px 150px, rgba(255,255,255,0.2), transparent),
      radial-gradient(1px 1px at 500px 50px, rgba(255,255,255,0.3), transparent),
      radial-gradient(2px 2px at 700px 200px, rgba(255,255,255,0.15), transparent),
      radial-gradient(1px 1px at 900px 100px, rgba(255,255,255,0.25), transparent),
      radial-gradient(2px 2px at 1100px 180px, rgba(255,255,255,0.2), transparent),
      radial-gradient(1px 1px at 200px 400px, rgba(255,255,255,0.2), transparent),
      radial-gradient(2px 2px at 400px 500px, rgba(255,255,255,0.15), transparent),
      radial-gradient(1px 1px at 600px 450px, rgba(255,255,255,0.25), transparent),
      radial-gradient(2px 2px at 800px 550px, rgba(255,255,255,0.2), transparent),
      radial-gradient(1px 1px at 1000px 480px, rgba(255,255,255,0.15), transparent),
      radial-gradient(2px 2px at 150px 300px, rgba(255,255,255,0.1), transparent),
      radial-gradient(1px 1px at 1050px 350px, rgba(255,255,255,0.2), transparent);
  }

  /* Network lines */
  .network-line {
    position: absolute;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(30, 120, 255, 0.15), transparent);
    transform-origin: left center;
  }
  .network-line:nth-child(1) { top: 120px; left: 600px; width: 400px; transform: rotate(15deg); }
  .network-line:nth-child(2) { top: 300px; left: 700px; width: 350px; transform: rotate(-10deg); }
  .network-line:nth-child(3) { top: 450px; left: 650px; width: 500px; transform: rotate(5deg); }
  .network-line:nth-child(4) { top: 200px; left: 800px; width: 300px; transform: rotate(-20deg); }

  /* Content */
  .content {
    position: relative;
    z-index: 2;
    max-width: 700px;
  }

  .badge {
    display: inline-block;
    background: rgba(30, 120, 255, 0.15);
    border: 1px solid rgba(30, 120, 255, 0.4);
    color: rgba(100, 180, 255, 1);
    padding: 8px 20px;
    border-radius: 30px;
    font-size: 16px;
    font-weight: 600;
    letter-spacing: 1px;
    margin-bottom: 30px;
  }

  .name {
    font-size: 72px;
    font-weight: 800;
    background: linear-gradient(135deg, #ffffff 0%, #a0c4ff 50%, #60a5ff 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    line-height: 1.1;
    margin-bottom: 12px;
    letter-spacing: -1px;
  }

  .title {
    font-size: 42px;
    font-weight: 700;
    color: rgba(255, 255, 255, 0.95);
    margin-bottom: 28px;
    letter-spacing: -0.5px;
  }

  .subtitle {
    font-size: 20px;
    color: rgba(255, 255, 255, 0.6);
    line-height: 1.6;
    margin-bottom: 36px;
    max-width: 500px;
  }

  .tech-stack {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
  }

  .tech-item {
    background: rgba(30, 120, 255, 0.1);
    border: 1px solid rgba(30, 120, 255, 0.25);
    color: rgba(150, 200, 255, 0.9);
    padding: 8px 18px;
    border-radius: 20px;
    font-size: 15px;
    font-weight: 500;
  }

  /* Right side photo */
  .right-decor {
    position: absolute;
    right: 80px;
    top: 50%;
    transform: translateY(-50%);
    z-index: 2;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .photo-wrapper {
    position: relative;
  }

  .photo-glow {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 340px;
    height: 340px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(30, 90, 200, 0.4) 0%, rgba(0, 40, 120, 0.2) 50%, transparent 70%);
    filter: blur(30px);
  }

  .photo {
    width: 280px;
    height: 280px;
    border-radius: 50%;
    object-fit: cover;
    border: 3px solid rgba(30, 120, 255, 0.4);
    box-shadow: 0 8px 40px rgba(0, 0, 0, 0.5), 0 0 60px rgba(30, 90, 200, 0.2);
    position: relative;
    z-index: 1;
  }

  /* Floating icons */
  .float-icon {
    position: absolute;
    width: 48px;
    height: 48px;
    background: rgba(10, 20, 40, 0.6);
    border: 1px solid rgba(30, 120, 255, 0.25);
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
    z-index: 2;
  }
  .float-icon.icon1 { right: 420px; top: 80px; }
  .float-icon.icon2 { right: 40px; top: 100px; }
  .float-icon.icon3 { right: 400px; bottom: 80px; }
  .float-icon.icon4 { right: 50px; bottom: 100px; }

  /* Corner accent */
  .corner-accent {
    position: absolute;
    top: 0;
    right: 0;
    width: 200px;
    height: 200px;
    background: linear-gradient(225deg, rgba(30, 120, 255, 0.08), transparent);
  }

  .bottom-accent {
    position: absolute;
    bottom: 0;
    left: 0;
    width: 100%;
    height: 2px;
    background: linear-gradient(90deg, transparent, rgba(30, 120, 255, 0.3), rgba(0, 150, 255, 0.5), rgba(30, 120, 255, 0.3), transparent);
  }
</style>
</head>
<body>
  <div class="container">
    <!-- Background effects -->
    <div class="glow-orb orb1"></div>
    <div class="glow-orb orb2"></div>
    <div class="glow-orb orb3"></div>
    <div class="grid-overlay"></div>
    <div class="dots"></div>
    <div class="corner-accent"></div>
    <div class="bottom-accent"></div>

    <!-- Network lines -->
    <div class="network-line"></div>
    <div class="network-line"></div>
    <div class="network-line"></div>
    <div class="network-line"></div>

    <!-- Floating icons -->
    <div class="float-icon icon1">⚛️</div>
    <div class="float-icon icon2">🚀</div>
    <div class="float-icon icon3">⚡</div>
    <div class="float-icon icon4">🔧</div>

    <!-- Main content -->
    <div class="content">
      <div class="badge">FULL STACK DEVELOPER</div>
      <div class="name">TIAGO</div>
      <div class="title">Building Modern<br/>Web Applications</div>
      <div class="subtitle">Full-stack developer crafting scalable solutions with the latest web technologies</div>
      <div class="tech-stack">
        <span class="tech-item">React</span>
        <span class="tech-item">Node.js</span>
        <span class="tech-item">Python</span>
        <span class="tech-item">Next.js</span>
        <span class="tech-item">TypeScript</span>
      </div>
    </div>

    <!-- Right side photo -->
    <div class="right-decor">
      <div class="photo-wrapper">
        <div class="photo-glow"></div>
        <img src="me.jpg" alt="Tiago Nascimento" class="photo" />
      </div>
    </div>
  </div>
</body>
</html>
